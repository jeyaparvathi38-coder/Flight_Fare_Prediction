<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SkyFare.Aero{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glassmorphism.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="bg-particles"></div>
    
    <nav class="navbar glass-nav animate-fade-in">
        <a href="{{ url_for('index') }}" class="nav-brand">
            <i class="fas fa-plane-departure gradient-text"></i>
            <span>SkyFare<span class="gradient-text">.Aero</span></span>
        </a>
        
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="{{ url_for('performance') }}" class="nav-link"><i class="fas fa-server"></i> Models</a>
            <a href="{{ url_for('insights') }}" class="nav-link"><i class="fas fa-lightbulb"></i> Insights</a>
            <a href="{{ url_for('predict_page') }}" class="btn btn-primary btn-sm"><i class="fas fa-magic"></i> Predict</a>
            
            <button id="theme-toggle" class="btn btn-secondary" style="padding: 0.5rem; border-radius: 50%;">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main style="flex: 1; padding: 2rem 0;">
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 2rem; border-top: 1px solid rgba(0,0,0,0.1); margin-top: auto;" class="glass-nav">
        <p style="color: var(--text-muted-light);">
            &copy; 2026 SkyFare.Aero – AI Flight Fare Prediction. Designed with <i class="fas fa-heart gradient-text"></i>
        </p>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        async function logout() {
            try {
                const res = await fetch('/api/auth/logout', { method: 'POST' });
                if (res.ok) window.location.href = '/';
            } catch (e) { console.error(e); }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
